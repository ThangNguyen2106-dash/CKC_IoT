<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Config</title>

<style>
body {
  background:#0b1220;
  color:#e5e7eb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}
.card {
  background:#111827;
  padding:25px;
  border-radius:12px;
  width:320px;
}
h2 {text-align:center;color:#22c55e;}
input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  background:#1f2937;
  color:white;
}
button {
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="card">
<h2>WiFi Setup</h2>

<form action="/save">
<label>SSID</label>
<select name="ssid" id="wifiList">
<option>Đang quét...</option>
</select>

<label>Password</label>
<input type="password" name="pass">

<button type="submit">Lưu</button>
</form>
</div>

<script>
function loadWiFi(){
  fetch('/scan')
  .then(res=>res.json())
  .then(data=>{
    let list=document.getElementById("wifiList");
    list.innerHTML="";
    data.forEach(w=>{
      let op=document.createElement("option");
      op.value=w;
      op.text=w;
      list.appendChild(op);
    });
  });
}

loadWiFi();
</script>

</body>
</html>
